<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login & Sign Up</title>

      <script type="module" crossorigin src="/assets/auth-Bf1bq2Gb.js"></script>
      <link rel="modulepreload" crossorigin href="/assets/nav-bar-tjDq7EMg.js">
      <link rel="stylesheet" crossorigin href="/assets/nav-bar-D-eBs45y.css">
      <link rel="stylesheet" crossorigin href="/assets/auth-Cv2fpf2j.css">
    <link rel="manifest" href="/manifest.webmanifest"></head>

    <body>
        <nav-bar></nav-bar>
        <div class="auth-container">
            <h1 id="auth-heading" class="auth-heading">Welcome to Vent</h1>

            <p class="auth-subtitle">
                Enter your email. If you're new, we'll create your secure node
                instantly. No passwords, no friction.
            </p>

            <form aria-labelledby="auth-heading">
                <div class="input-group">
                    <label for="email" class="auth-label"
                        >Work or Personal Email</label
                    >
                    <input
                        type="email"
                        id="email"
                        autofocus
                        placeholder="name@example.com"
                        required
                    />
                </div>

                <button type="submit">Get Magic Link</button>
            </form>

            <div class="auth-footer-container">
                <p class="auth-footer-text">
                    By entering, you contribute to a collective database of
                    solved problems.
                </p>
            </div>
        </div>

    </body>
</html>
