<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Sign Up</title>
    <link rel="stylesheet" href="/skin/base.css">
    <link rel="stylesheet" href="/skin/auth_style_placeholder.css">
    <script src="/subsystems/state/state.js"></script>
</head>
<body>
    <nav-bar></nav-bar>
    <div class="auth-container">
        <h1 style="color: var(--text-primary);">Join the Think Tank</h1>
        <form aria-labelledby="auth-heading">
            <div class="input-group">
                <label for="email" style="display: block; margin-bottom: var(--spacing-unit);">Email Address</label>
                <input type="email" id="email" placeholder="e.g., name@example.com" required 
                    style="width: 100%; padding: 12px; border: 1px solid var(--accent-color); border-radius: 4px;">
            </div>
            <button type="submit" style="margin-top: 20px; padding: 12px 24px; background: var(--accent-color); color: white; border: none; border-radius: 4px; cursor: pointer;">
                Continue
            </button>
        </form>
        <p style="font-size: 0.9rem; margin-top: 15px;">No complex passwords required. We use secure magic links.</p>
    </div>
<script src="/subsystems/router.js"></script>
</body>
</html>
