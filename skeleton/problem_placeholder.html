<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Problems</title>
        <link rel="stylesheet" href="../skin/base.css">
        <link rel="stylesheet" href="../skin/problem_style_placeholder.css">
        <script src="../subsystems/state/state.js"></script>
        <script src="../subsystems/db.js"></script>
    </head>

    <body>
        <nav-bar></nav-bar>

        <div class="empty-container">
            <div id="suggestion-box" style="display: none; padding: 20px; margin: 20px; border: 2px solid #007bff; border-radius: 8px; text-align: center; color: var(--text-color);">
                <h3>Ready to save your vents?</h3>
                <p>We noticed you've been exploring. Create an account to keep track of your problems!</p>
                <button onclick="window.location.href='auth_placeholder.html'" style="border: none; padding: 10px 20px; border-radius: 20px;">Sign Up Now</button>
                <button id="dismiss-suggestion" style="background: none; border: none; color: #888; text-decoration: underline; cursor: pointer; margin-left: 10px;">Not now</button>
            </div>
        </div>

        <template id="nav-bar-template">
            <style>
                nav { background: #333; padding: 10px; display: flex; justify-content: center; }
                .nav-links a { color: rgba(255, 255, 255, 0.6); text-decoration: none; margin: 0 15px; font-family: sans-serif; font-weight: bold; }
                .nav-links a:hover, .nav-links a.active { color: white; }
            </style>
            <nav>
                <div class="nav-links"></div>
            </nav>
        </template>

        <template id="user-card-template">
            <style>
                .header { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
                .profile-picture { width: 150px; height: 150px; background-color: #ddd; border-radius: 50%; margin-bottom: 20px; }
                .username { margin: 10px 0; color: var(--text-color, #333); }
            </style>
            <div class="header">
                <div class="profile-picture"></div>
                <h1 class="username"></h1>
                <p class="bio"></p>
            </div>
        </template>

        <script>
            document.addEventListener('DOMContentLoaded', () => {
                if (!window.appState) return;

                // TRIGGER 2: Increment count simply for visiting this page
                window.appState.data.visitCount++;

                // Show box if count > 3 AND user hasn't dismissed it
                if (window.appState.data.visitCount > 3 && !window.appState.ui.dismissedSuggestion) {
                    const box = document.getElementById('suggestion-box');
                    if (box) box.style.display = 'block';
                }

                // Handle the "Not Now" choice
                document.getElementById('dismiss-suggestion').addEventListener('click', () => {
                    window.appState.ui.dismissedSuggestion = true;
                    document.getElementById('suggestion-box').style.display = 'none';
                });
            });
        </script>

        <script src="../subsystems/logic/nav-bar.js"></script>

        <script src="../subsystems/logic/user-card.js"></script>
    </body>
</html>
