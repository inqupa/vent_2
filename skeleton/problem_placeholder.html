<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Problems</title>
        <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
        <link rel="stylesheet" href="../skin/theme.css">
        <link rel="stylesheet" href="../skin/base.css">
        <link rel="stylesheet" href="../skin/problem_style_placeholder.css">
        <script src="../subsystems/bootloader/bootloader.js" defer></script>
    </head>

    <body>
        <nav-bar></nav-bar>

        <div class="empty-container">
            <div id="suggestion-box" style="display: none; padding: 20px; margin: 20px; border: 2px solid #007bff; border-radius: 8px; text-align: center; color: var(--text-color);">
                <h3>Ready to save your vents?</h3>
                <p>We noticed you've been exploring. Create an account to keep track of your problems!</p>
                <button onclick="window.location.href='auth_placeholder.html'" style="border: none; padding: 10px 20px; border-radius: 20px;">Sign Up Now</button>
                <button id="dismiss-suggestion" style="background: none; border: none; color: #888; text-decoration: underline; cursor: pointer; margin-left: 10px;">Not now</button>
            </div>
        </div>

        <template id="nav-bar-template">
            <style>
                nav { background: var(--nav-bg); padding: 10px; display: flex; justify-content: center; }
                .nav-links a { color: var(--nav-link-color); text-decoration: none; margin: 0 15px; font-family: sans-serif; font-weight: bold; }
                .nav-links a:hover, .nav-links a.active { color: #3DB5FF; }
            </style>
            <nav>
                <div class="nav-links"></div>
            </nav>
        </template>

        <script>
            document.addEventListener('DOMContentLoaded', () => {
                
                // Create an initialization loop to wait for the bootloader
                const initializeProblemPage = () => {
                    
                    // 1. If state isn't injected yet, wait 50ms and try again
                    if (!window.appState || !window.appState.data) {
                        setTimeout(initializeProblemPage, 50);
                        return;
                    }

                    // 2. Sanitize data (Resets NaN back to 0 if your old save got corrupted)
                    if (typeof window.appState.data.visitCount !== 'number' || isNaN(window.appState.data.visitCount)) {
                        window.appState.data.visitCount = 0;
                    }

                    // Function to evaluate if the suggestion box should be shown
                    const checkSuggestionStatus = () => {
                        const count = window.appState.data.visitCount;
                        const dismissed = window.appState.ui.dismissedSuggestion;
                        
                        console.log(`Checking Suggestion: Count is ${count}, Dismissed is ${dismissed}`);
                        
                        if (count > 3 && !dismissed) {
                            const box = document.getElementById('suggestion-box');
                            if (box) box.style.display = 'block';
                        }
                    };

                    // 3. Subscribe to changes
                    window.subscribeToState('data', checkSuggestionStatus);
                    window.subscribeToState('ui', checkSuggestionStatus);

                    // 4. Increment the visit count for the current visit
                    window.appState.data.visitCount++;

                    // 5. Initial check
                    checkSuggestionStatus();

                    // Handle the "Not Now" choice
                    document.getElementById('dismiss-suggestion').addEventListener('click', () => {
                        window.appState.ui.dismissedSuggestion = true;
                        document.getElementById('suggestion-box').style.display = 'none';
                    });
                };

                // Start the initialization loop
                initializeProblemPage();
            });
        </script>
    </body>
</html>
