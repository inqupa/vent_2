<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link rel="stylesheet" href="../skin/profile_style_placeholder.css">
    <script src="/subsystems/state/state.js"></script>
</head>
<body>

    <div class="profile-container">
        <div class="profile-header">
            <div class="profile-picture"></div>
            <h1 class="username">User Name</h1>
            <p class="bio">Short bio or user description goes here.</p>
        </div>

        <div class="profile-details">
            <div class="detail-item">
                <strong>Email:</strong> <span>user@example.com</span>
            </div>
            <div class="detail-item">
                <strong>Location:</strong> <span>City, Country</span>
            </div>
            <div class="detail-item">
                <strong>Joined:</strong> <span>January 2026</span>
            </div>
        </div>

        <div class="profile-actions">
            <button type="button">Edit Profile</button>
        </div>
    </div>
<script src="/subsystems/router.js"></script>
</body>
</html>
