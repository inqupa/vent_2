<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vent | your problem</title>
        <link rel="stylesheet" href="/skin/theme.css">
        <link rel="stylesheet" href="/skin/base.css">
        <script src="/subsystems/state/state.js"></script>
        <script src="/subsystems/db.js"></script>
        <script src="/subsystems/bootloader/bootloader.js" defer></script>
    </head>
    <body>
        <a href="#main-content" class="skip-link" style="position: absolute; left: -10000px; top: auto; width: 1px; height: 1px; overflow: hidden;">
            Skip to main content
        </a>

        <nav-bar></nav-bar>

        <div style="position: absolute; 
            top: 45%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            z-index: -1; 
            width: 100%; 
            text-align: center; 
            pointer-events: none; 
            user-select: none;">
            <span style="font-family: 'Courier New', monospace; 
                        font-weight: 900; 
                        /* Gigantic scale based on screen width */
                        font-size: 25vw; 
                        color: var(--accent-color); 
                        /* Increased visibility */
                        opacity: 0.07; 
                        letter-spacing: -1.5vw;
                        text-transform: uppercase;
                        line-height: 1;">
                VENT
            </span>
        </div>

        <main id="main-content" class="hero-section">
            <div style="flex-grow: 1;"></div>

            <section class="input-section glass-card" style="width: 100%; max-width: 900px; padding: 12px 20px 12px 30px; margin-bottom: 40px; display: flex; align-items: flex-end; gap: 20px;">
                <textarea id="vent-input" autofocus placeholder="Begin typing..." aria-label="Express your thoughts here"
                        rows="1"
                        style="flex-grow: 1;
                        min-height: 24px; 
                        max-height: 300px;
                        justify-content: center; 
                        border: none;
                        outline: none;
                        background: transparent;
                        font-size: 1.4rem;
                        font-weight: 500;
                        line-height: 1.4;
                        color: var(--text-primary); 
                        resize: none;
                        padding: 5px 0; 
                        -webkit-font-smoothing: antialiased;
                        overflow-y: auto; /* script handles expansion, no scrollbar needed */
                        scrollbar-width: none; /* firefox hide */
                        -ms-overflow-style: none; /* IE/Edge hide */
                        "></textarea>
                
                <button id="submit-vent" aria-label="Submit Vent" style="background: none; border: none; padding: 0; cursor: pointer; display: flex; align-items: center; width: 60px; height: 60px; flex-shrink: 0;">
                    <svg width="41" height="41" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" style="color: var(--accent-color);">
                        <path d="M21.5711 11.2332L4.82311 3.01217C3.86121 2.54044 2.80237 3.39329 3.09765 4.39892L5.43261 11.2501L14.9998 12.0001L5.43261 12.7501L3.09765 19.6013C2.80237 20.6069 3.86121 21.4598 4.82311 20.988L21.5711 12.767C22.143 12.486 22.143 11.5142 21.5711 11.2332Z" />
                    </svg>
                </button>
            </section>

            <footer role="contentinfo" style="padding-bottom: 20px; opacity: 0.4; font-size: 0.8rem;">
                <p>A safe space for your thoughts. Built by the Think Tank.</p>
            </footer>
        </main>

        <template id="nav-bar-template">
            <style>
                nav { background: var(--nav-bg); padding: 10px; display: flex; justify-content: center; }
                .nav-links a { color: var(--nav-link-color); text-decoration: none; margin: 0 15px; font-family: sans-serif; font-weight: bold; }
                .nav-links a:hover, .nav-links a.active { color: #3DB5FF; }
            </style>
            <nav>
                <div class="nav-links"></div>
            </nav>
        </template>
        
        <script>
            document.querySelector('#submit-vent').addEventListener('click', function(e) {
                e.preventDefault(); // Prevent default button behavior just in case
                
                if (window.appState) {
                    window.appState.data.visitCount++;
                }
                
                // Add a tiny delay to ensure the Proxy has time to write to localStorage 
                // before the page context is destroyed by the redirect.
                setTimeout(() => {
                    window.location.href = '/skeleton/problem_placeholder.html';
                }, 50); 
            });
        </script>
        
        <script>
            // Phase 2.1: Predictive Hover Logic
            const submitBtn = document.querySelector('.input-section button');

            if (submitBtn) {
                submitBtn.addEventListener('mouseenter', () => {
                    console.log("%c Predictive Signal: Preparing assets...", "color: #6f42c1;");
                    if (window.appState) {
                        window.appState.data.visitCount++;
                    }
                });
            }
        </script>
        
        <script>
            const tx = document.getElementById('vent-input');
            
            function OnInput() {
                this.style.height = 'auto'; 
                // We add a tiny offset or check to ensure it doesn't "jump"
                this.style.height = (this.scrollHeight) + "px";
            }

            tx.addEventListener("input", OnInput, false);

            // FIX: Run the calculation on page load to center the placeholder
            window.addEventListener('load', () => {
                OnInput.call(tx); 
                tx.focus();
            });
        </script>
        
        <script>
            // Force focus on page load to ensure "Always Ready" state
            window.addEventListener('load', () => {
                const input = document.querySelector('#vent-input') || document.querySelector('#email');
                if (input) input.focus();
            });
        </script>

        <script>
            const startApp = async () => {
                // Fix for Issue #1: Centralized Service Worker Registration
                if ('serviceWorker' in navigator) {
                    try {
                        await navigator.serviceWorker.register('/sw.js');
                        console.log('Phase 3.3: Service Worker Active');
                    } catch (err) {
                        console.error('SW Registration Failed:', err);
                    }
                }

                // Fix for Issue #2: Global Database Error Handling
                if (window.initDB) {
                    try {
                        await window.initDB();
                        console.log("Phase 3.1: Database Connected");
                    } catch (dbErr) {
                        // If the database fails, we show a visual warning to the user
                        console.error("Database initialization failed:", dbErr);
                        const errorBanner = document.createElement('div');
                        errorBanner.style = "position:fixed; top:0; width:100%; background:red; color:white; text-align:center; padding:10px; z-index:9999; font-family:sans-serif;";
                        errorBanner.textContent = "Critical Error: Offline storage is unavailable.";
                        document.body.prepend(errorBanner);
                    }
                }
            };

            // This ensures everything starts only after the page is fully loaded
            window.addEventListener('load', startApp);
        </script>

        <script src="/subsystems/logic/nav-bar.js"></script>
    </body>
</html>
