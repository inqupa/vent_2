<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vent | your problem</title>
    <link rel="stylesheet" href="/skin/base.css">
    <script src="/subsystems/state/state.js"></script>
</head>
<body>

    <div class="main-container">
        <div class="logo-section">
            <h1 class="faded-logo">VENT</h1>
        </div>

        <div class="input-section">
            <input type="text" placeholder="vent here...">
            <button type="button">Submit</button>
        </div>
    </div>
    <script src="/subsystems/router.js"></script>
    <script>
        // Finds the button and tells it to go to the auth page when clicked
        document.querySelector('button').addEventListener('click', function() {
            window.location.href = '/skeleton/problem_placeholder.html';
        });
    </script>
    <script>
        // Phase 2.1: Predictive Hover Logic
        // Detects when the user might be about to click and prepares the state.
        const submitBtn = document.querySelector('.input-section button');

        if (submitBtn) {
            submitBtn.addEventListener('mouseenter', () => {
                console.log("%c Predictive Signal: User hovering on Submit. Preparing assets...", "color: #6f42c1; font-weight: bold;");
                
                // Increment visitCount or trigger a state change to signal intent
                if (window.appState && window.appState.user) {
                    window.appState.user.visitCount++;
                }
            });
        }
    </script>
</body>
</html>
