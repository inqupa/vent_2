<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vent | your problem</title>
        <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
        <link rel="stylesheet" href="/skin/theme.css">
        <link rel="stylesheet" href="/skin/base.css">
        <script src="/subsystems/state/state.js"></script>
        <script src="/subsystems/db.js"></script>
        <script src="/subsystems/bootloader/bootloader.js" defer></script>
    </head>
    <body>
        <a href="#main-content" class="skip-link" style="position: absolute; left: -10000px; top: auto; width: 1px; height: 1px; overflow: hidden;">
            Skip to main content
        </a>

        <nav-bar></nav-bar>

        <div class="bg-watermark-container">
            <span class="bg-watermark-text">
                VENT
            </span>
        </div>

        <main id="main-content" class="hero-section">
            <div style="flex-grow: 1;"></div>

            <section class="input-section glass-card vent-input-container">
                <textarea id="vent-input" class="vent-input-area" autofocus placeholder="Begin typing..." aria-label="Express your thoughts here" rows="1"></textarea>
                
                <button id="submit-vent" class="vent-submit-btn" aria-label="Submit Vent">
                    <svg width="41" height="41" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" class="vent-submit-icon">
                        <path d="M21.5711 11.2332L4.82311 3.01217C3.86121 2.54044 2.80237 3.39329 3.09765 4.39892L5.43261 11.2501L14.9998 12.0001L5.43261 12.7501L3.09765 19.6013C2.80237 20.6069 3.86121 21.4598 4.82311 20.988L21.5711 12.767C22.143 12.486 22.143 11.5142 21.5711 11.2332Z" />
                    </svg>
                </button>
            </section>

            <footer role="contentinfo" class="footer-text">
                <p>A safe space for your thoughts. Built by the Think Tank.</p>
            </footer>
        </main>
        
        <script>
            document.querySelector('#submit-vent').addEventListener('click', async function(e) {
                e.preventDefault();
                
                const input = document.getElementById('vent-input');
                const content = input.value.trim();
                
                if (content && window.saveVent) {
                    const ventData = {
                        content: content,
                        vent_month_year: new Date().toLocaleString('en-US', { month: 'long', year: 'numeric' })
                    };
                    
                    try {
                        await window.saveVent(ventData);
                        
                        setTimeout(() => {
                            window.location.href = '/skeleton/problem_placeholder.html';
                        }, 500);
                        
                    } catch (err) {
                        alert("Connection failed. Your vent could not be saved.");
                    }
                }
            });
        </script>
        
        <script>
            const submitBtn = document.querySelector('#submit-vent');
            let hoverChecked = false;

            if (submitBtn) {
                const triggerHover = () => {
                    if (hoverChecked) return;
                    hoverChecked = true;

                    const preloads = ['/skeleton/problem_placeholder.html', '/skin/problem_style_placeholder.css'];
                    preloads.forEach(href => {
                        const link = document.createElement('link');
                        link.rel = 'prefetch';
                        link.href = href;
                        document.head.appendChild(link);
                    });

                    fetch('/api/problems/access?peek=true')
                        .then(res => res.json())
                        .then(data => {
                            if (data.requireAuth) {
                                const authLink = document.createElement('link');
                                authLink.rel = 'prefetch';
                                authLink.href = '/skeleton/auth_placeholder.html';
                                document.head.appendChild(authLink);
                            }
                        }).catch(err => {});
                };

                submitBtn.addEventListener('mouseenter', triggerHover, { once: true });
                submitBtn.addEventListener('touchstart', triggerHover, { once: true });
            }
        </script>
        
        <script>
            const tx = document.getElementById('vent-input');
            
            function OnInput() {
                this.style.height = 'auto'; 
                // We add a tiny offset or check to ensure it doesn't "jump"
                this.style.height = (this.scrollHeight) + "px";
            }

            tx.addEventListener("input", OnInput, false);

            // FIX: Run the calculation on page load to center the placeholder
            window.addEventListener('load', () => {
                OnInput.call(tx); 
                tx.focus();
            });
        </script>
        
        <script>
            // Force focus on page load to ensure "Always Ready" state
            window.addEventListener('load', () => {
                const input = document.querySelector('#vent-input') || document.querySelector('#email');
                if (input) input.focus();
            });
        </script>

        <script>
            const startApp = async () => {
                // Fix for Issue #1: Centralized Service Worker Registration
                if ('serviceWorker' in navigator) {
                    try {
                        await navigator.serviceWorker.register('/sw.js');
                        console.log('Phase 3.3: Service Worker Active');
                    } catch (err) {
                        console.error('SW Registration Failed:', err);
                    }
                }

                // Fix for Issue #2: Global Database Error Handling
                if (window.initDB) {
                    try {
                        await window.initDB();
                        console.log("Phase 3.1: Database Connected");
                    } catch (dbErr) {
                        // If the database fails, we show a visual warning to the user
                        console.error("Database initialization failed:", dbErr);
                        const errorBanner = document.createElement('div');
                        errorBanner.style = "position:fixed; top:0; width:100%; background:red; color:white; text-align:center; padding:10px; z-index:9999; font-family:sans-serif;";
                        errorBanner.textContent = "Critical Error: Offline storage is unavailable.";
                        document.body.prepend(errorBanner);
                    }
                }
            };

            // This ensures everything starts only after the page is fully loaded
            window.addEventListener('load', startApp);
        </script>

        <script src="/subsystems/logic/nav-bar.js"></script>
    </body>
</html>
